<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistress Rema | Official Portfolio</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: #ffffff;
            overflow-x: hidden;
        }

        .glass-container { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-premium {
            background: linear-gradient(135deg, #6366f1 0%, #d946ef 100%);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(168, 85, 247, 0.4);
        }

        .btn-premium:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(168, 85, 247, 0.6);
        }

        .card-feature {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .card-feature:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body class="py-10 px-4">

    <div id="root"></div>

    <script type="text/babel">
        const PROFILE_DATA = {
            name: "Mistress Rema",
            title: "Misstress",
            bio: "Join me on my creative journey through my official platforms. My feet are waiting for you 👣🐕",
            stats: [
                { label: "Followers", value: "+10K" },
                { label: "Works", value: "+150" },
                { label: "Experience", value: "3 Years" }
            ],
            features: [
                { title: "Exclusive Content", desc: "Full access to unreleased photos and videos." },
                { title: "Custom Requests", desc: "Tailored content created specifically for your desires." },
                { title: "Direct Support", desc: "Direct and exclusive communication via Telegram." }
            ],
            images: {
                p1: "https://i.ibb.co/5XDxLvPw/IMG-20260306-235324-924.jpg",
                p2: "https://i.ibb.co/YT0pp26C/IMG-20260306-235337-718.jpg"
            },
            links: {
                facebook: "https://www.facebook.com/profile.php?id=61587549741687",
                instagram: "https://www.instagram.com/remy_2029?igsh=MWZjZjRmbXhtYXQ3NQ==",
                telegram: "https://t.me/remamistress"
            }
        };

        const App = () => {
            return (
                <div className="max-w-2xl mx-auto space-y-6">
                    
                    {/* Header Card */}
                    <div className="glass-container rounded-[3rem] p-8 text-center animate-fade">
                        <div className="flex justify-center gap-4 mb-8">
                            <img src={PROFILE_DATA.images.p1} className="w-24 h-24 sm:w-32 sm:h-32 rounded-full border-2 border-purple-500/30 p-1 object-cover shadow-2xl" alt="Profile 1" />
                            <img src={PROFILE_DATA.images.p2} className="w-24 h-24 sm:w-32 sm:h-32 rounded-3xl border-2 border-pink-500/30 p-1 object-cover rotate-3 shadow-2xl" alt="Profile 2" />
                        </div>
                        
                        <h1 className="text-4xl sm:text-5xl font-black text-gradient mb-2">{PROFILE_DATA.name}</h1>
                        <p className="text-purple-400 font-bold tracking-widest text-sm uppercase mb-4">{PROFILE_DATA.title}</p>
                        <p className="text-gray-400 leading-relaxed max-w-md mx-auto">{PROFILE_DATA.bio}</p>
                        
                        {/* Stats Section */}
                        <div className="grid grid-cols-3 gap-4 mt-8 pt-8 border-t border-white/5">
                            {PROFILE_DATA.stats.map((stat, i) => (
                                <div key={i}>
                                    <div className="text-xl font-bold text-white">{stat.value}</div>
                                    <div className="text-xs text-gray-500 uppercase tracking-tighter">{stat.label}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Quick Action Buttons */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 animate-fade" style={{animationDelay: '0.2s'}}>
                        <a href={PROFILE_DATA.links.telegram} className="btn-premium py-4 rounded-2xl text-center font-bold flex items-center justify-center gap-2">
                            <span>Join Private Channel</span>
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        </a>
                        <a href={PROFILE_DATA.links.instagram} className="bg-white/5 hover:bg-white/10 border border-white/10 py-4 rounded-2xl text-center font-bold transition-all">
                            View Art Gallery
                        </a>
                    </div>

                    {/* Features Section */}
                    <div className="grid grid-cols-1 gap-4 animate-fade" style={{animationDelay: '0.4s'}}>
                        {PROFILE_DATA.features.map((f, i) => (
                            <div key={i} className="card-feature p-5 rounded-2xl flex items-center gap-5">
                                <div className="w-12 h-12 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400 font-bold">
                                    0{i+1}
                                </div>
                                <div>
                                    <h3 className="font-bold text-white">{f.title}</h3>
                                    <p className="text-sm text-gray-500">{f.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Social Links Footer */}
                    <div className="glass-container rounded-3xl p-6 flex justify-center gap-8 animate-fade" style={{animationDelay: '0.6s'}}>
                        <a href={PROFILE_DATA.links.facebook} className="text-gray-400 hover:text-blue-500 transition-colors">
                            <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
                        </a>
                        <a href={PROFILE_DATA.links.instagram} className="text-gray-400 hover:text-pink-500 transition-colors">
                            <svg className="w-8 h-8" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                        </a>
                        <a href={PROFILE_DATA.links.telegram} className="text-gray-400 hover:text-blue-400 transition-colors">
                            <svg className="w-8 h-8" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>
                        </a>
                    </div>

                    <p className="text-center text-gray-600 text-xs pb-10">© 2026 Mistress Rema. All rights reserved.</p>
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

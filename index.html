<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistress Rema | Official Profile</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NE8QH6RTWG"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-NE8QH6RTWG');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            /* خلفية محسنة بألوان جذابة ومتدرجة */
            background-image: 
                linear-gradient(to bottom right, rgba(15, 12, 41, 0.9), rgba(48, 43, 99, 0.8), rgba(36, 11, 54, 0.95)), 
                url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: #ffffff;
        }

        /* تأثير الزجاج المحسن */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* تأثيرات التحويم (Hover) المحسنة للأيقونات */
        .icon-hover { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            color: rgba(255,255,255,0.6); 
            padding: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
        }
        .icon-hover:hover { 
            transform: translateY(-5px) scale(1.1); 
            color: #fff; 
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.5);
        }

        /* تأثير التوهج للصور */
        .img-glow {
            transition: all 0.5s ease;
        }
        .img-glow:hover {
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.4);
            transform: scale(1.05) rotate(0deg) !important;
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #d8b4fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 sm:p-8">

    <div id="root" class="w-full max-w-lg w-full"></div>

    <script type="text/babel">
        // ==========================================
        // منطقة المتغيرات - يمكنك تعديل بياناتك هنا بسهولة
        // ==========================================
        const PROFILE_DATA = {
            name: "Mistress Rema",
            subtitle: "Misstress",
            bio: "Join me on my creative journey through my official platforms. My feet are waiting for you 👣🐕",
            images: {
                profile1: "https://i.ibb.co/5XDxLvPw/IMG-20260306-235324-924.jpg",
                profile2: "https://i.ibb.co/YT0pp26C/IMG-20260306-235337-718.jpg"
            },
            links: {
                facebook: "https://www.facebook.com/profile.php?id=61587549741687",
                instagram: "https://www.instagram.com/remy_2029?igsh=MWZjZjRmbXhtYXQ3NQ==",
                telegram: "https://t.me/remamistress"
            }
        };

        const ProfileCard = () => {
            const { name, subtitle, bio, images, links } = PROFILE_DATA;

            return (
                <div className="w-full py-8">
                    <div className="glass-card rounded-[2.5rem] overflow-hidden relative">
                        
                        {/* تأثير إضاءة خفيف في الخلفية */}
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-32 bg-purple-500/20 blur-[60px] rounded-full pointer-events-none"></div>

                        {/* قسم الصور */}
                        <div className="flex flex-row gap-4 sm:gap-6 pt-12 pb-6 items-center justify-center relative z-10">
                            <img 
                                src={images.profile1} 
                                alt="Profile 1" 
                                className="img-glow w-28 h-28 sm:w-36 sm:h-36 rounded-full border-[3px] border-white/10 p-1 object-cover z-10" 
                            />
                            
                            <img 
                                src={images.profile2} 
                                alt="Profile 2" 
                                className="img-glow w-28 h-28 sm:w-36 sm:h-36 rounded-2xl border-[3px] border-white/10 p-1 object-cover rotate-6 -ml-8 sm:-ml-10" 
                            />
                        </div>

                        {/* قسم النصوص */}
                        <div className="px-8 pb-8 text-center relative z-10">
                            <h1 className="text-4xl sm:text-5xl font-black mb-2 tracking-tight text-gradient">
                                {name}
                            </h1>
                            <p className="text-pink-400 text-xs sm:text-sm font-bold tracking-[0.25em] uppercase mb-5">
                                {subtitle}
                            </p>
                            <p className="text-gray-300 leading-relaxed text-sm sm:text-base max-w-sm mx-auto opacity-80 font-medium">
                                {bio}
                            </p>
                        </div>

                        {/* قسم روابط التواصل الاجتماعي */}
                        <div className="flex justify-center items-center gap-6 py-8 border-t border-white/10 bg-black/20">
                            
                            {/* Facebook Link */}
                            <a href={links.facebook} target="_blank" rel="noopener noreferrer" className="icon-hover" aria-label="Facebook">
                                <svg className="w-6 h-6 sm:w-7 sm:h-7" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" />
                                </svg>
                            </a>
                            
                            {/* Instagram Link */}
                            <a href={links.instagram} target="_blank" rel="noopener noreferrer" className="icon-hover" aria-label="Instagram">
                                <svg className="w-6 h-6 sm:w-7 sm:h-7" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">
                                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                                </svg>
                            </a>

                            {/* Telegram Link */}
                            <a href={links.telegram} target="_blank" rel="noopener noreferrer" className="icon-hover" aria-label="Telegram">
                                <svg className="w-6 h-6 sm:w-7 sm:h-7" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">
                                    <path d="m22 2-7 20-4-9-9-4Z"></path>
                                    <path d="M22 2 11 13"></path>
                                </svg>
                            </a>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProfileCard />);
    </script>
</body>
</html>
